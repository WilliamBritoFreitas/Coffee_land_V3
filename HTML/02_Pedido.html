'
<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Delivery</title>
    <!-- TailWind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--  -->
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!--  -->
    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/style.css" />
    <!--  -->

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!--  -->

</head>

<body>
    <header class="bg-white flex justify-between py-8 px-40 sticky top-0 z-50 shadow-lg">
        <img src="../Assets/Logo/Coffe_Delivery_Logo.svg" alt="Marca Coffee Delivery" />
        <div data-debug="right_header" class="flex content-between gap-3">
            <div data-debug="local" class="flex bg-[#EBE5F9] rounded-md items-center gap-1 p-2">
                <img src="../Assets/Graficos/icones/map_pin_roxo.svg" alt="Mapa Pin" />
                <p class="font-[roboto] font-medium not-last-of-type:text-sm text-[#4B2995]">Fortaleza, Ce</p>
            </div>

            <div data-debug="carrinho_botao" class="bg-[#F1E9C9] p-2">
                <div data-debug="carrinho_mask"
                    class="w-6 h-6 bg-[#C47F17] transition-transform duration-300 hover:scale-125 cursor-pointer"
                    style="mask: url(../Assets/Graficos/icones/shopping-cart-fill.svg) no-repeat center / contain; -webkit-mask: url(&quot;../Assets/Graficos/icones/shopping-cart-fill.svg&quot;) no-repeat center / contain">
                </div>
            </div>
        </div>
    </header>
    <main>
        <div data-painel-grid class="py-8 px-40">
            <div data-box_endereco>
                <p class="font-['Baloo_2'] text-lg font-bold mb-4">Complete seu pedido</p>
                <div data-form class="bg-[#F3F2F2] p-10">
                    <div data-cabeca_form class="flex  items-start">
                        <!-- <img src="../Assets/Graficos/icones/map-pin-line-regular.svg" alt=""> -->
                        <div data_pin_mapa="pin_mask" class="w-6 h-6 bg-[#C47F17]"
                            style="mask: url('../Assets/Graficos/icones/map-pin-line-regular.svg') no-repeat center / contain; -webkit-mask: url(&quot;../Assets/Graficos/icones/map-pin-line-regular.svg&quot;) no-repeat center / contain">
                        </div>
                        <div data-Endereco de Entrega>
                            <p class="font-[roboto] font-normal text-[#403937] text-[16px] mb-0.5">Endereço de Entrega
                            </p>
                            <span class="mt-4 font-[roboto] font-normal text-[#403937] text-[14px]">Informe o endereço
                                onde deseja receber seu pedido</span>
                        </div>
                    </div>
                    <form action="#" class="mt-8 font-[Roboto] text-[14px]">
                        <div data-grid_fomulario class="grid grid-cols-1 md:grid-cols-6 gap-4">
                            <div class="bg-[#E6E5E5] md:col-span-2">
                                <input type="text" placeholder="CEP"
                                    class="w-full border outline-none p-3 border-[#E6E5E5] rounded-md">
                            </div>
                            <div class="bg-[#E6E5E5] md:col-span-6">
                                <input type="text" placeholder="Rua"
                                    class="w-full border outline-none p-3 border-[#E6E5E5] rounded-md">
                            </div>
                                <div class="bg-[#E6E5E5] md:col-span-2">
                                    <input type="text" placeholder="Número" class="w-full border outline-none p-3 border-[#E6E5E5] rounded-md">
                                </div>
                                <div class="bg-[#E6E5E5] md:col-span-4">
                                    <input type="text" placeholder="Complemento" class="w-full border outline-none p-3 border-[#E6E5E5] rounded-md">
                                </div>

                                <div class="bg-[#E6E5E5] md:col-span-2">
                                    <input type="text" placeholder="Bairro" class="w-full border outline-none p-3 border-[#E6E5E5] rounded-md">
                                </div>
                                <div class="bg-[#E6E5E5] md:col-span-3">
                                    <input type="text" placeholder="Cidade" class="w-full border outline-none p-3 border-[#E6E5E5] rounded-md">
                                </div>
                                <div class="bg-[#E6E5E5] md:col-span-1">
                                    <input type="text" placeholder="UF" class="w-full border outline-none p-3 border-[#E6E5E5] rounded-md">
                                </div>


                        </div>


                    </form>

                </div>
            </div>

        </div>

    </main>

</body>

</html>'
