    <header class="bg-white flex justify-between py-8 px-40 sticky top-0 z-50 shadow-lg">

        <div data-debug="right_header" class="flex content-between gap-3">

            </div>
        </div>
    </header>
    <main>
        <div data-painel-grid class="py-8 px-40">
            <div data-box_endereco>
                <p>complete seu pedido</p>
                <div data-form>
                    <div data-cabeca_form class="flex">
                        <img src="../Assets/Graficos/icones/map-pin-line-regular.svg" alt="">
                        <div>
                            <p class="mt-4 font-[roboto] font-normal text-[20px]">Endereço de Entrega</p>
                            <span>Informe o endereço onde deseja receber seu pedido</span>
                        </div>
                     

                    </div>
                    
                </div>
        </div>

        </div>
