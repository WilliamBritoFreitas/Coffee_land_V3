<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Delivery</title>
    <!-- TailWind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--  -->
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <!--  -->
    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/style.css" />
    <!--  -->
  </head>
  <body>
    <header class="bg-white flex justify-between py-8 px-40 sticky top-0 z-50 shadow-lg">
      <img src="../Assets/Logo/Coffe_Delivery_Logo.svg" alt="Marca Coffee Delivery" />
      <div id="right_header" class="flex gap-3">
        <div id="local" class="flex bg-[#EBE5F9] rounded-md items-center gap-1 p-2">
          <img class="fill-[#f1df54]" src="../Assets/Graficos/icones/map_pin_roxo.svg" alt="Mapa Pin" />
          <p class="font-[roboto] text-sm text-[#4B2995]">Fortaleza, Ce</p>
        </div>
        <div id="carrinho_botao">
          <img src="../Assets/Graficos/icones/shopping-cart-fill.svg" alt="Carrinho de Compra" />
        </div>
      </div>
    </header>
  </body>
</html>
