<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Delivery</title>
    <!-- TailWind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--  -->
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <!--  -->
    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/style.css" />
    <!--  -->
  </head>
  <body>
    <header class="bg-white flex justify-between py-8 px-40 sticky top-0 z-50 shadow-lg">
      <img src="../Assets/Logo/Coffe_Delivery_Logo.svg" alt="Marca Coffee Delivery" />
      <div id="right_header" class="flex gap-3">
        <div id="local" class="flex bg-[#EBE5F9] rounded-md items-center gap-1 p-2">
          <img src="../Assets/Graficos/icones/map_pin_roxo.svg" alt="Mapa Pin" />
          <p class="font-[roboto] font-medium not-last-of-type:text-sm text-[#4B2995]">Fortaleza, Ce</p>
        </div>

        <div id="carrinho_botao" class="bg-[#F1E9C9] p-2">
          <div id="carrinho_mask" class="w-6 h-6 bg-[#C47F17] transition-transform duration-300 hover:scale-125 cursor-pointer" style="mask: url(../Assets/Graficos/icones/shopping-cart-fill.svg) no-repeat center / contain; -webkit-mask: url(&quot;../Assets/Graficos/icones/shopping-cart-fill.svg&quot;) no-repeat center / contain"></div>
        </div>
      </div>
    </header>
    <section id="banner" class="mt-20">
      <div id="banner_conteudo">
        <h1>Encontre o café perfeito para qualquer hora do dia</h1>
        <p>Com o Coffee Delivery você recebe seu café onde estiver, a qualquer hora<</p>
      </div>
    </section>
  </body>
</html>
